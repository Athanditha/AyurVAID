version: '3.8'

services:
  # -------------------------------------------------------------
  # Gateway: Nginx Reverse Proxy / Front door of the application
  # -------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: ayurvaid-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ayurvaid-network

  # -------------------------------------------------------------
  # Frontend: Standalone Next.js Application
  # -------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: ayurvaid-frontend
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - ayurvaid-network

  # -------------------------------------------------------------
  # Backend: Node.js Express API Server
  # -------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: ayurvaid-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=ayurvaid_premium_health_intelligence_secret_key_2024
      - PYTHON_API_URL=http://python-api:8000
    depends_on:
      - python-api
    networks:
      - ayurvaid-network

  # -------------------------------------------------------------
  # Python ML Service: FastAPI running CatBoost predictions
  # -------------------------------------------------------------
  python-api:
    build:
      context: .
      dockerfile: server/python/Dockerfile
    container_name: ayurvaid-python-api
    restart: always
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    networks:
      - ayurvaid-network

networks:
  ayurvaid-network:
    driver: bridge
